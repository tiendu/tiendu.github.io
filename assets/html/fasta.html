<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASTA Parser</title>
</head>
<body>
    <textarea id="fasta_input" rows="6" cols="61" placeholder="Paste FASTA sequences here..."></textarea><br />
    
    <select id="option_select">
        <option value="gc_content">Calculate GC content</option>
        <option value="deduplicate">Deduplicate sequences</option>
        <option value="kmer_profile">Generate k-mer profile</option>
    </select>
    
    <button type="button" onclick="parseFastaFromInput()">Parse</button>
    <div id="parsed_output"></div>

    <script src="/assets/scripts/readFasta.js"></script>
    <script>
        function parseFastaFromInput() {
            const fastaContent = document.getElementById("fasta_input").value;
            const selectedOption = document.getElementById("option_select").value;
            const sequences = readSequencesFromFasta(fastaContent);
            
            if (selectedOption === "kmer_profile") {
                const k = parseInt(document.getElementById("k_value_input").value, 10);
                if (isNaN(k) || k < 1) {
                    alert("Please enter a valid positive integer for k.");
                    return;
                }
                displayKmerProfiles(sequences, k);
            } else if (selectedOption === "gc_content") {
                displayGCContent(sequences);
            } else if (selectedOption === "deduplicate") {
                const deduplicatedFasta = deduplicateSequences(sequences);
                displayDeduplicatedFasta(deduplicatedFasta);
            }
        }

        function displayDeduplicatedFasta(deduplicatedFasta) {
            const outputDiv = document.getElementById("parsed_output");
            outputDiv.innerHTML = ""; // Clear previous content
            
            const preElement = document.createElement("pre");
            preElement.innerText = deduplicatedFasta;
            outputDiv.appendChild(preElement);
        }
    </script>
</body>
