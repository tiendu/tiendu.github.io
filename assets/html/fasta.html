---
layout: page
---

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASTA Parser</title>
</head>
<body>
    <textarea id="fasta_input" rows="6" cols="61" placeholder="Paste FASTA sequences here..."></textarea><br />
    
    <div id="kmer_option" style="display: none;">
        <label for="k_value_input">Enter k value for k-mer profile:</label>
        <input type="number" id="k_value_input" min="1" value="3" style="width: 50px;">
    </div>
    
    <select id="option_select">
        <option value="kmer_profile" selected>Generate k-mer profile</option>
        <option value="gc_content">Calculate GC content</option>
    </select>
    
    <button type="button" onclick="parseFastaFromInput()">Parse</button>
    <div id="parsed_output"></div>

    <script src="/assets/scripts/readFasta.js"></script>
    <script>
        function toggleKmerOption() {
            const kmerOptionDiv = document.getElementById("kmer_option");
            const selectElement = document.getElementById("option_select");
            if (selectElement.value === "kmer_profile") {
                kmerOptionDiv.style.display = "block";
            } else {
                kmerOptionDiv.style.display = "none";
            }
        }
    </script>
</body>
