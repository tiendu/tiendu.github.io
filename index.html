---
layout: default
---
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;500;600&family=Noto+Sans+Mono:wght@400;500;700&family=Bungee+Shade&display=swap" rel="stylesheet">
  
<style>
  :root {
    --bg-terminal: #303446;
    --fg-primary: #c6d0f5;
    --fg-secondary: #8caaee;
    --fg-dim: #b5bfe2;
    --cursor: #f2d5cf;
    --body-font: "Playpen Sans", sans-serif;
    --mono: "Noto Sans Mono", monospace;
    --radius: 10px;
  }

  .landing-wrapper {
    font-family: var(--body-font);
    max-width: 700px;
    margin: 2rem 1rem 3rem 1rem;
  }

  @media (min-width: 600px) {
    .landing-wrapper {
      margin: 3rem auto 4rem auto;
      font-size: 1.05rem;
    }
  }

  .landing-greeting {
    font-family: var(--body-font);
    color: var(--fg-secondary);
    font-weight: 500;
    font-size: 1.2rem;
    margin-bottom: 1rem;
  }

  .terminal-container {
    background: var(--bg-terminal);
    color: var(--fg-primary);
    padding: 1rem;
    border-radius: var(--radius);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(0, 0, 0, 0.6);
  }

  .terminal-container .menu-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: -1rem -1rem 1rem -1rem;
    padding: 0.5rem 1rem;
    background: #e0e0e0;
    border-top-left-radius: var(--radius);
    border-top-right-radius: var(--radius);
  }

  .terminal-container .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
  }

  .terminal-container .dot.red { background: #ff5f57; }
  .terminal-container .dot.yellow { background: #ffbd2e; }
  .terminal-container .dot.green { background: #28c840; }

  .terminal-container .typeme {
    display: inline-block;
    font-family: var(--mono);
    white-space: nowrap;
    overflow: hidden;
    border-right: 10px solid var(--cursor);
    animation: typing 2s steps(24), blink 0.5s step-end infinite alternate;
  }

  .terminal-container .text-secondary {
    color: var(--fg-secondary);
  }

  .terminal-container .text-background {
    color: var(--fg-dim);
  }

  .terminal-container .cursor {
    color: var(--cursor);
  }

  .terminal-container .output {
    width: 100%;
    max-width: 80ch;
    margin-top: 1rem;
    font-family: var(--body-font);
    font-weight: 400;
    line-height: 1.6;
    color: var(--fg-primary);
    animation: fade 5s;
  }

  .terminal-container .output p {
    margin: 0 0 0.8rem 0;
  }

  @keyframes typing {
    0% { width: 0; }
    100% { width: 24ch; }
  }

  @keyframes blink {
    50% { border-color: transparent; }
  }

  @keyframes fade {
    0% { opacity: 0; }
    50% { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
